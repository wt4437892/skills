interface:
  display_name: "项目经历面试官"
  short_description: "基于当前项目只负责出题，并把题目落到统一输出目录的 Markdown 文件"
  default_prompt: "使用 $project-experience-interviewer 基于当前项目做最小初始化和定点补证，只输出一道真实项目经历面试题，并先写入统一输出目录中的 Markdown 文件，再返回题目与保存路径。不输出参考回答、评分或讲解。先遵守共享口吻规则 `../project-experience-shared/references/voice-rules.md`，再遵守本 skill 的出题规则。默认采用结构化面试思路，优先真实经历题或场景题；题目必须像真人面试官现场发问：短、直接、不铺垫、不使用讲解腔、不机械使用“请详细阐述/从几个方面回答”这类模板词，只问主问题，不把追问全塞进去。如果项目主栈是 Java，优先覆盖集合、并发、JVM、异常与稳定性、缓存/数据库/消息队列协同、线上排障等高频主干能力，并避开婚育、年龄、健康、宗教、国籍等合规禁区。"
